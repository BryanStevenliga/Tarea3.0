name: CI/CD Pipeline - Ejercicio 3.0.0

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout de código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar pruebas (Pytest)
      run: |
        python -m pytest

    - name: Ejecutar la aplicación de forma local
      run: |
        python app/todo.py

    - name: Simular fase de despliegue
      run: |
        echo "Iniciando despliegue de simulación..."
        echo "¡Despliegue simulado con éxito!"

    - name: Iniciar sesión en GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Este paso convierte tu usuario "BryanStevenliga" a minúsculas para que Docker no falle
    - name: Convertir nombre de usuario a minúsculas
      id: string
      run: |
        echo "IMAGE_NAME=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/ejercicio" >> $GITHUB_ENV

    - name: Construir y publicar imagen Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_ENV_NAME_NOT_SET }}${{ env.IMAGE_NAME }}:3.0.0